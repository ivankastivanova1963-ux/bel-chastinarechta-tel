<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ТЪРСАЧ НА СЪКРОВИЩА - Универсален</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Comfortaa', sans-serif;
            background: #4cc9f0 url('https://i.postimg.cc/SKbB4SnK/Gemini-Generated-Image-6xo7rr6xo7rr6xo7.png') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #setup-screen, #game-screen, #result-screen {
            display: none;
            width: 90%;
            max-width: 450px;
            text-align: center;
            z-index: 10;
        }

        .active { display: flex !important; flex-direction: column; align-items: center; justify-content: center; height: 100%; }

        h1 { color: #2c3e50; text-shadow: 2px 2px 0 white; font-size: 1.8rem; margin: 10px 0; }

        .card {
            background: rgba(255, 255, 255, 0.92);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 0 #bdc3c7;
            width: 100%;
            box-sizing: border-box;
        }

        .option-group { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        
        .avatar-btn {
            cursor: pointer; background: white; border: 4px solid transparent; 
            border-radius: 20px; box-shadow: 0 6px 0 #ccc; transition: 0.2s;
            font-size: 45px; width: 80px; height: 80px; 
            display: flex; align-items: center; justify-content: center;
        }
        
        .selected { border-color: #f1c40f !important; transform: translateY(4px); box-shadow: 0 2px 0 #f39c12 !important; background: #fff9c4; }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 12px 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .timer { background: #e74c3c; padding: 5px 12px; border-radius: 8px; font-weight: bold; }

        .pool {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
            border: 3px solid white;
            border-radius: 20px;
            width: 100%;
            height: 45vh;
            position: relative;
            padding: 10px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .word {
            background: white;
            padding: 12px 18px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #2c3e50;
            box-shadow: 0 5px 0 #95a5a6;
            position: absolute;
            cursor: grab;
            user-select: none;
            white-space: nowrap;
        }

        .chest-area {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 15px;
            gap: 8px;
        }

        .chest {
            flex: 1;
            height: 110px;
            background: #8e44ad url('https://www.svgrepo.com/show/418571/treasure-chest-gold.svg') no-repeat center 10px;
            background-size: 55px;
            border-radius: 15px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 8px;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 7px 0 #4a235a;
        }

        .btn {
            background: #2ecc71; color: white; border: none; padding: 18px 40px;
            font-size: 1.4rem; border-radius: 20px; box-shadow: 0 8px 0 #27ae60;
            font-weight: bold; cursor: pointer; font-family: inherit; margin-top: 15px;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #27ae60; }
        
        .btn-orange { background: #e67e22; box-shadow: 0 6px 0 #d35400; font-size: 1rem; padding: 12px; width: 100%; margin-top: 10px;}

        @keyframes shake { 0% {transform:translateX(0)} 25% {transform:translateX(-10px)} 75% {transform:translateX(10px)} }
        .error { animation: shake 0.3s ease; background: #ff7675 !important; color: white !important;}

        .score-val { color: #f1c40f; font-size: 1.4rem; }
    </style>
</head>
<body>

    <div id="setup-screen" class="active">
        <h1>🏝️ ТЪРСАЧ</h1>
        <div class="card">
            <h3>Избери своя аватар:</h3>
            <div class="option-group">
                <div class="avatar-btn selected" onclick="setAvatar('🐱', this)">🐱</div>
                <div class="avatar-btn" onclick="setAvatar('🦊', this)">🦊</div>
                <div class="avatar-btn" onclick="setAvatar('🦜', this)">🦜</div>
                <div class="avatar-btn" onclick="setAvatar('🏴‍☠️', this)">🏴‍☠️</div>
            </div>
        </div>
        <button class="btn" onclick="startGame()">ЗАПОЧНИ!</button>
    </div>

    <div id="game-screen">
        <div class="stats-bar">
            <span id="player-info" style="font-size: 1.5rem;"></span>
            <span class="timer">⏳ <span id="clock">60</span>s</span>
            <span>Точки: <span id="score" class="score-val">0</span></span>
        </div>
        <div class="pool" id="pool"></div>
        <div class="chest-area">
            <div class="chest" data-type="n">Съществително</div>
            <div class="chest" data-type="a">Прилагателно</div>
            <div class="chest" data-type="v">Глагол</div>
        </div>
        <button class="btn btn-orange" onclick="checkErrors()">ПРОВЕРИ ГРЕШКИТЕ</button>
    </div>

    <div id="result-screen">
        <div class="card">
            <h1 style="color:#2c3e50">🏁 БРАВО!</h1>
            <div id="avatar-final" style="font-size: 4rem;"></div>
            <h2 id="final-score" style="font-size: 2rem; color: #27ae60;"></h2>
            <button class="btn" onclick="location.reload()">ИГРАЙ ПАК</button>
        </div>
    </div>

    <audio id="sound-err" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    <script>
        const masterBank = [
            {t:'куче',c:'n'}, {t:'котка',c:'n'}, {t:'дете',c:'n'}, {t:'дърво',c:'n'}, {t:'къща',c:'n'}, {t:'книга',c:'n'}, {t:'море',c:'n'}, {t:'слънце',c:'n'}, {t:'кораб',c:'n'}, {t:'ябълка',c:'n'}, {t:'цвете',c:'n'}, {t:'риба',c:'n'}, {t:'планина',c:'n'}, {t:'река',c:'n'}, {t:'небе',c:'n'}, {t:'облак',c:'n'}, {t:'дъжд',c:'n'}, {t:'сняг',c:'n'}, {t:'зима',c:'n'}, {t:'лято',c:'n'}, {t:'град',c:'n'}, {t:'кола',c:'n'}, {t:'топка',c:'n'}, {t:'птица',c:'n'}, {t:'гора',c:'n'}, {t:'камък',c:'n'}, {t:'ученик',c:'n'}, {t:'учител',c:'n'},
            {t:'тича',c:'v'}, {t:'пее',c:'v'}, {t:'играе',c:'v'}, {t:'чете',c:'v'}, {t:'пише',c:'v'}, {t:'скача',c:'v'}, {t:'плува',c:'v'}, {t:'рисува',c:'v'}, {t:'яде',c:'v'}, {t:'пие',c:'v'}, {t:'гледа',c:'v'}, {t:'слуша',c:'v'}, {t:'мисли',c:'v'}, {t:'спи',c:'v'}, {t:'ходи',c:'v'}, {t:'смее',c:'v'}, {t:'готви',c:'v'}, {t:'чисти',c:'v'}, {t:'носи',c:'v'}, {t:'дава',c:'v'}, {t:'взема',c:'v'}, {t:'пътува',c:'v'}, {t:'печели',c:'v'}, {t:'търси',c:'v'}, {t:'намира',c:'v'}, {t:'лети',c:'v'}, {t:'грее',c:'v'}, {t:'духа',c:'v'}, {t:'вали',c:'v'}, {t:'прави',c:'v'}, {t:'кара',c:'v'},
            {t:'красив',c:'a'}, {t:'умен',c:'a'}, {t:'бърз',c:'a'}, {t:'силен',c:'a'}, {t:'голям',c:'a'}, {t:'малък',c:'a'}, {t:'топъл',c:'a'}, {t:'студен',c:'a'}, {t:'червен',c:'a'}, {t:'син',c:'a'}, {t:'зелен',c:'a'}, {t:'жълт',c:'a'}, {t:'добър',c:'a'}, {t:'лош',c:'a'}, {t:'смел',c:'a'}, {t:'висок',c:'a'}, {t:'нисък',c:'a'}, {t:'дълъг',c:'a'}, {t:'нов',c:'a'}, {t:'стар',c:'a'}, {t:'весел',c:'a'}, {t:'тъжен',c:'a'}, {t:'мил',c:'a'}, {t:'светъл',c:'a'}, {t:'вкусен',c:'a'}, {t:'тежък',c:'a'}, {t:'лек',c:'a'}, {t:'чист',c:'a'}, {t:'мръсен',c:'a'}, {t:'бавен',c:'a'}
        ];

        let player = { av: '🐱', sc: 0, err: [] };
        let timeLeft = 60, timer;

        function setAvatar(av, el) {
            [...el.parentElement.children].forEach(c => c.classList.remove('selected'));
            el.classList.add('selected'); player.av = av;
        }

        function startGame() {
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            document.getElementById('player-info').innerText = player.av;
            
            const pool = document.getElementById('pool');
            const words = [...masterBank].sort(() => 0.5 - Math.random()).slice(0, 20);
            
            words.forEach(word => {
                const w = document.createElement('div');
                w.className = 'word';
                w.innerText = word.t;
                
                // Случайно разположение в полето
                w.style.left = Math.random() * (pool.clientWidth - 80) + 'px';
                w.style.top = Math.random() * (pool.clientHeight - 50) + 'px';

                // Универсална логика за движение (Мишка + Тъч)
                let isDragging = false;
                let offsetX, offsetY;

                const onStart = (e) => {
                    isDragging = true;
                    w.style.cursor = 'grabbing';
                    const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                    const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                    offsetX = clientX - w.getBoundingClientRect().left;
                    offsetY = clientY - w.getBoundingClientRect().top;
                    w.style.zIndex = 1000;
                };

                const onMove = (e) => {
                    if (!isDragging) return;
                    e.preventDefault();
                    const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                    const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                    const rect = pool.getBoundingClientRect();
                    w.style.left = (clientX - rect.left - offsetX) + 'px';
                    w.style.top = (clientY - rect.top - offsetY) + 'px';
                };

                const onEnd = (e) => {
                    if (!isDragging) return;
                    isDragging = false;
                    w.style.cursor = 'grab';
                    w.style.visibility = 'hidden';
                    const clientX = e.type.includes('touch') ? e.changedTouches[0].clientX : e.clientX;
                    const clientY = e.type.includes('touch') ? e.changedTouches[0].clientY : e.clientY;
                    const dropTarget = document.elementFromPoint(clientX, clientY);
                    w.style.visibility = 'visible';
                    w.style.zIndex = 10;

                    const chest = dropTarget ? dropTarget.closest('.chest') : null;
                    if (chest) {
                        if (word.c === chest.dataset.type) {
                            player.sc += 2; w.remove();
                        } else {
                            player.sc -= 1;
                            player.err.push(`"${word.t}" не е ${chest.innerText}`);
                            document.getElementById('sound-err').play();
                            w.classList.add('error');
                            setTimeout(() => w.classList.remove('error'), 300);
                        }
                        document.getElementById('score').innerText = player.sc;
                    }
                };

                w.addEventListener('mousedown', onStart);
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onEnd);
                
                w.addEventListener('touchstart', onStart, {passive: false});
                window.addEventListener('touchmove', onMove, {passive: false});
                window.addEventListener('touchend', onEnd);

                pool.appendChild(w);
            });

            timer = setInterval(() => {
                timeLeft--;
                document.getElementById('clock').innerText = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
        }

        function checkErrors() {
            if(player.err.length === 0) alert("Браво! Нямаш грешки.");
            else alert("Последни грешки: \n" + player.err.slice(-5).join("\n"));
        }

        function endGame() {
            clearInterval(timer);
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');
            document.getElementById('avatar-final').innerText = player.av;
            document.getElementById('final-score').innerText = player.sc + " точки";
        }
    </script>
</body>
</html>
